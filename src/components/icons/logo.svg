<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="drop1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="drop2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 左の雫（SOS側・上向き）-->
  <path d="M22 38 C22 38 12 27 12 21 C12 14.4 16.5 10 22 10 C27.5 10 32 14.4 32 21 C32 27 22 38 22 38Z"
    fill="url(#drop1)" opacity="0.95" filter="url(#glow)"/>

  <!-- 右の雫（サポーター側・下向き・反転）-->
  <path d="M36 22 C36 22 46 33 46 39 C46 45.6 41.5 50 36 50 C30.5 50 26 45.6 26 39 C26 33 36 22 36 22Z"
    fill="url(#drop2)" opacity="0.75"/>

  <!-- 交点の光 -->
  <circle cx="29" cy="30" r="2.5" fill="white" opacity="0.9" filter="url(#glow)"/>

  <!-- ロゴタイプ -->
  <text x="58" y="27" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="800" fill="#0F172A" letter-spacing="-0.3">明日も<tspan fill="url(#drop1)">sama</tspan><tspan fill="url(#drop2)">sama</tspan></text>
  <text x="58" y="42" font-family="'Helvetica Neue',Arial,sans-serif" font-size="8" font-weight="300" fill="#94A3B8" letter-spacing="3.5">SDGs MATCH</text>
</svg>
