  <!-- 右の雫（反転） -->
  <path d="M36 20 C36 20 50 34 50 42 C50 50.8 43.7 56 36 56 C28.3 56 22 50.8 22 42 C22 34 36 20 36 20Z"
    fill="url(#d2)" opacity="0.75"/>
  <!-- 交点 -->
  <circle cx="32" cy="32" r="4" fill="white" opacity="0.9" filter="url(#g)"/>
</svg>
