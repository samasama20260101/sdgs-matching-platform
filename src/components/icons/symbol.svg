  </defs>
  <!-- 背景丸 -->
  <rect width="64" height="64" rx="14" fill="#0F172A"/>
  <!-- 左の雫 -->
  <path d="M28 44 C28 44 14 30 14 22 C14 13.2 20.3 8 28 8 C35.7 8 42 13.2 42 22 C42 30 28 44 28 44Z"
